version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: portalsemed-db
    environment:
      POSTGRES_DB: portalSemed
      POSTGRES_USER: semed_user
      POSTGRES_PASSWORD: change_me_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - portalsemed-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semed_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP Application
  app:
    image: php:8.5-fpm-alpine
    container_name: portalsemed-app
    working_dir: /var/www/portalsemed
    volumes:
      - ./PortalSemed:/var/www/portalsemed
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: portalSemed
      DB_USER: semed_user
      DB_PASS: change_me_in_production
      JWT_SECRET: mude_para_chave_segura_aleatoria_com_minimo_32_caracteres
    networks:
      - portalsemed-network
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: portalsemed-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./PortalSemed/public:/var/www/portalsemed/public
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/certbot/conf:/etc/letsencrypt:ro
      - ./docker/certbot/www:/var/www/certbot:ro
    networks:
      - portalsemed-network
    depends_on:
      - app

  # Certbot for SSL (opcional)
  certbot:
    image: certbot/certbot
    container_name: portalsemed-certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    networks:
      - portalsemed-network
    profiles:
      - ssl

volumes:
  postgres_data:

networks:
  portalsemed-network:
    driver: bridge
