<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - SEMED</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div id="header"></div>

    <main class="login-container" style="margin-top: 150px;">
        
        <div class="login-card">
            <h2>Recuperar Senha</h2>
            
            <p class="instrucao-recuperar">
                Digite o seu e-mail cadastrado abaixo. Enviaremos um link seguro para você redefinir a sua senha.
            </p>

            <form action="#" method="POST">
                
                <div class="input-group">
                    <label for="email">E-mail institucional ou pessoal:</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <button type="submit" class="btn-verde-claro" style="width: 100%; margin-top: 15px;">
                    Enviar Link de Recuperação
                </button>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="login.html" class="link-voltar" style="color: #4B5563; text-decoration: underline; font-size: 0.9rem;">
                        Voltar para o Login
                    </a>
                </div>

            </form>
        </div>

    </main>
        <div id="footer"></div>
    <script src="../js/include-components.js"></script>

</body>
</html>
