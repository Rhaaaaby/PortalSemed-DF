<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias - SEMED</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .noticias-public-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .page-header-title {
            color: #2D4F43;
            border-left: 5px solid #2D4F43;
            padding-left: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <main class="noticias-public-container" style="min-height: 70vh;">
        <h1 class="page-header-title">Todas as Notícias</h1>
        
        <div id="container-noticias" class="noticias-container-secao" style="margin-top: 20px;">
            <!-- As notícias serão carregadas aqui via JavaScript -->
            <p style="text-align: center; color: #666; font-size: 1.1rem; width: 100%;">Carregando notícias...</p>
        </div>
    </main>

    <div id="footer"></div>

    <script src="../js/config.js"></script>
    <script src="../js/include-components.js"></script>
    <script src="../js/model.js"></script>
    <script src="../js/controller.js"></script>
</body>
</html>
