<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendário - SEMED</title>
  <link rel="stylesheet" href="../css/calendario.css" />
</head>
<body>

<div id="header"></div>

<!-- ── HERO ── -->
<div class="hero">
  <h1>calendário</h1>
</div>

<!-- ── CONTEÚDO PRINCIPAL ── -->
<main class="cal-main">
  <div class="accent-bar"></div>

  <!-- CALENDÁRIO -->
  <div class="cal-wrapper">

    <!-- Toolbar -->
    <div class="cal-toolbar">
      <button class="btn-today">today</button>
      <button>&#8249;</button>
      <button>&#8250;</button>
    </div>

    <!-- Grade -->
    <div class="cal-grid">

      <!-- Cabeçalhos dos dias -->
      <div class="cal-head">dom.</div>
      <div class="cal-head">seg.</div>
      <div class="cal-head">ter.</div>
      <div class="cal-head">qua.</div>
      <div class="cal-head">qui.</div>
      <div class="cal-head">sex.</div>
      <div class="cal-head">sáb.</div>

      <!-- Semana 1 (sobra do mês anterior) -->
      <div class="cal-cell"><div class="cal-num">30</div></div>
      <div class="cal-cell current-month"><div class="cal-num">1</div></div>
      <div class="cal-cell current-month"><div class="cal-num">2</div></div>
      <div class="cal-cell current-month"><div class="cal-num">3</div></div>
      <div class="cal-cell current-month"><div class="cal-num">4</div></div>
      <div class="cal-cell current-month"><div class="cal-num">5</div></div>
      <div class="cal-cell current-month"><div class="cal-num">6</div></div>

      <!-- Semana 2 -->
      <div class="cal-cell current-month"><div class="cal-num">7</div></div>
      <div class="cal-cell current-month"><div class="cal-num">8</div></div>
      <div class="cal-cell current-month"><div class="cal-num">9</div></div>
      <div class="cal-cell current-month">
        <div class="cal-num">10</div>
        <div class="event green"><span class="dot"></span>Reunião de Pais – 14h</div>
      </div>
      <div class="cal-cell current-month"><div class="cal-num">11</div></div>
      <div class="cal-cell current-month"><div class="cal-num">12</div></div>
      <div class="cal-cell current-month"><div class="cal-num">13</div></div>

      <!-- Semana 3 -->
      <div class="cal-cell current-month"><div class="cal-num">14</div></div>
      <div class="cal-cell current-month today">
        <div class="cal-num">15</div>
        <div class="event green"><span class="dot"></span>Entrega de Projetos</div>
      </div>
      <div class="cal-cell current-month"><div class="cal-num">16</div></div>
      <div class="cal-cell current-month"><div class="cal-num">17</div></div>
      <div class="cal-cell current-month"><div class="cal-num">18</div></div>
      <div class="cal-cell current-month"><div class="cal-num">19</div></div>
      <div class="cal-cell current-month"><div class="cal-num">20</div></div>

      <!-- Semana 4 -->
      <div class="cal-cell current-month"><div class="cal-num">21</div></div>
      <div class="cal-cell current-month">
        <div class="cal-num">22</div>
        <div class="event dark"><span class="dot"></span>Conferência de Educação</div>
      </div>
      <div class="cal-cell current-month"><div class="cal-num">23</div></div>
      <div class="cal-cell current-month"><div class="cal-num">24</div></div>
      <div class="cal-cell current-month"><div class="cal-num">25</div></div>
      <div class="cal-cell current-month"><div class="cal-num">26</div></div>
      <div class="cal-cell current-month"><div class="cal-num">27</div></div>

      <!-- Semana 5 -->
      <div class="cal-cell current-month"><div class="cal-num">28</div></div>
      <div class="cal-cell current-month"><div class="cal-num">29</div></div>
      <div class="cal-cell current-month"><div class="cal-num">30</div></div>
      <div class="cal-cell"><div class="cal-num">1</div></div>
      <div class="cal-cell"><div class="cal-num">2</div></div>
      <div class="cal-cell"><div class="cal-num">3</div></div>
      <div class="cal-cell"><div class="cal-num">4</div></div>

    </div><!-- /cal-grid -->
  </div><!-- /cal-wrapper -->

  <div class="accent-bar bottom"></div>
</main>

<div id="footer"></div>

<script src="../js/include-components.js"></script>
</body>
</html>
