<!<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Portal - São Miguel do Tocantins</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header"></div>

    <!-- CONTEÚDO PRINCIPAL AJUSTADO -->
    <main class="login-main-container">
        <div class="login-card">
            <h2>Acesso ao Portal</h2>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" required>
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>
                
                <!-- Botão Entrar com a cor verde-alface -->
                <button type="submit" class="btn-entrar">Entrar</button>
                
                <a href="recuperar-senha.html" class="link-esqueci">Esqueci minha senha</a>
                
                <!-- Botão Fazer Cadastro -->               
                <a href="cadastro.html" class="btn-fazer-cadastro">Fazer Cadastro</a>
            </form>
        </div>
    </main>
    <div id="footer"></div>
    <script src="../js/include-components.js"></script>
</body>
</html>
