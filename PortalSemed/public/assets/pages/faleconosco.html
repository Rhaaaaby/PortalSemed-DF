<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fale Conosco - SEMED</title>
  <link rel="stylesheet" href="../css/faleconosco.css" />
</head>
<body>

<div id="header"></div>

<!-- ── HERO ── -->
<div class="hero">
  <h1>fale conosco</h1>
</div>

<!-- ── CONTEÚDO PRINCIPAL ── -->
<main class="contato-main">
  <div class="contato-card">

    <h2>Fale conosco</h2>

    <div class="contato-grid">

      <!-- FORMULÁRIO -->
      <div class="contato-form">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu nome" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Digite seu email" />
        </div>

        <div class="form-group">
          <label for="assunto">Assunto</label>
          <input type="text" id="assunto" name="assunto" placeholder="Escreva o assunto (dúvida, sugestão, reclamação e outros)" />
        </div>

        <div class="form-group">
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem..."></textarea>
        </div>

        <button type="button" class="btn-enviar">Enviar Mensagem</button>
      </div>

      <!-- CARD DE INFORMAÇÕES -->
      <aside class="info-card">
        <h3>Secretaria Municipal de Educação</h3>

        <div class="info-item">
          <span class="icon">📍</span>
          <span>Endereço: Rua Principal, nº 123 – São Miguel do Tocantins</span>
        </div>

        <div class="info-item">
          <span class="icon">📞</span>
          <span>Telefone: (63) 99999-9999</span>
        </div>

        <div class="info-item">
          <span class="icon">✉️</span>
          <span>E-mail: educacao@saomiguel.to.gov.br</span>
        </div>

        <div class="info-item">
          <span class="icon">🕐</span>
          <span>Atendimento: Seg - Sex | 08h às 17h</span>
        </div>
      </aside>

    </div><!-- /contato-grid -->
  </div><!-- /contato-card -->
</main>

<div id="footer"></div>

<script src="../js/include-components.js"></script>
</body>
</html>
