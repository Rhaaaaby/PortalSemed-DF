<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SEMED</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div id="header"></div>

    <main class="login-main-container">
        <div class="login-card">
            <h2>Faça seu Cadastro!</h2>
            <div id="register-message" class="message" style="display:none"></div>
            <form id="register-form">
                <div class="input-group">
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" name="name" placeholder="Digite seu Nome" required>
                </div>

                <div class="input-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" maxlength="14" required>
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Digite seu Telefone" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="password" placeholder="Digite sua Senha" required>
                </div>

                <div class="perfil-selecao">
                    <p>Você é:</p>
                    <div class="radio-group">
                        <label><input type="radio" name="role" value="servidor"> Administrador</label>
                        <label><input type="radio" name="role" value="funcionario"> Funcionário SEMED</label>
                    </div>
                </div>

                <button type="submit" class="btn-verde-claro">Criar Cadastro</button>

                <div style="text-align: center; margin-top: 10px;">
                    <a href="login.html" class="btn-verde-claro" style="display: inline-block; width: 80%; background-color: #8EB34E; text-decoration: none; color: white; padding: 10px; border-radius: 5px;">Entrar</a>
                </div>
            </form>
        </div>
    </main>
    <div id="footer"></div>
    <script src="../js/include-components.js"></script>
    <script src="../js/auth.js"></script>

</body>
</html>
