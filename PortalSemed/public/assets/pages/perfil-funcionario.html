<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Funcionário - SEMED</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div id="header"></div>

    <main class="dashboard-container">
        
        <div class="welcome-banner" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <h1>Olá, Funcionário!</h1>
            <button onclick="localStorage.clear(); window.location.href='login.html';" class="btn-verde-claro" style="background-color: #dc2626 !important; max-width: 120px; margin: 0 !important; border-radius: 6px;">Sair</button>
        </div>

        <div class="admin-grid">
            <a href="documentos.html" style="text-decoration: none; color: inherit;">
                <div class="admin-card">
                    <h3>📁 Fazer Upload</h3>
                    <p>Enviar novos anexos para o sistema</p>
                </div>
            </a>
            <a href="/noticias?action=create" style="text-decoration: none; color: inherit;">
                <div class="admin-card">
                    <h3>📰 Publicar Conteúdo</h3>
                    <p>Criar e publicar novas matérias</p>
                </div>
            </a>
            <a href="/noticias?action=index" style="text-decoration: none; color: inherit;">
                <div class="admin-card">
                    <h3>✏️ Editar Conteúdo</h3>
                    <p>Atualizar informações publicadas</p>
                </div>
            </a>
        </div>

    </main>
    <div id="footer"></div>
    <script src="../js/include-components.js"></script>
</body>
</html>
